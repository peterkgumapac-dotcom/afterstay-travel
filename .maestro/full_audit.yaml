appId: com.afterstay.travel
name: "Full App Audit"
---
# Wait for app to fully load
- waitForAnimationToEnd:
    timeout: 15000

# ═══ HOME SCREEN ═══
- takeScreenshot: screenshots/audit_01_home_initial

# Scroll down
- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/audit_02_home_scrolled

- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/audit_03_home_bottom

# Pull to refresh
- swipe:
    direction: DOWN
    duration: 400
- swipe:
    direction: DOWN
    duration: 400
- swipe:
    direction: DOWN
    duration: 800
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: screenshots/audit_04_home_refreshed

# ═══ MOMENTS TAB ═══
- tapOn:
    text: "Moments"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: screenshots/audit_05_moments

- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/audit_06_moments_scrolled

# ═══ DISCOVER TAB ═══
- tapOn:
    text: "Discover"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: screenshots/audit_07_discover

- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/audit_08_discover_scrolled

- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/audit_09_discover_bottom

# ═══ BUDGET TAB ═══
- tapOn:
    text: "Budget"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: screenshots/audit_10_budget

- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/audit_11_budget_scrolled

# ═══ MY TRIPS TAB ═══
- tapOn:
    text: "My Trips"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: screenshots/audit_12_mytrips

- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/audit_13_mytrips_scrolled

- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/audit_14_mytrips_bottom

# ═══ TRIP RECAP (tap past trip) ═══
- swipe:
    direction: DOWN
    duration: 500
- swipe:
    direction: DOWN
    duration: 500
- waitForAnimationToEnd

- tapOn:
    text: "Boracay"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: screenshots/audit_15_recap_hero

# Advance through slides by tapping right side
- tapOn:
    point: "80%,50%"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: screenshots/audit_16_recap_s2

- tapOn:
    point: "80%,50%"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: screenshots/audit_17_recap_s3

- tapOn:
    point: "80%,50%"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: screenshots/audit_18_recap_s4

- tapOn:
    point: "80%,50%"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: screenshots/audit_19_recap_s5

- tapOn:
    point: "80%,50%"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: screenshots/audit_20_recap_s6

- tapOn:
    point: "80%,50%"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: screenshots/audit_21_recap_s7

# Close recap
- pressKey: back
- waitForAnimationToEnd:
    timeout: 3000

# ═══ BACK TO HOME ═══
- tapOn:
    text: "Home"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: screenshots/audit_22_final_home
