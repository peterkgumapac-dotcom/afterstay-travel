appId: com.afterstay.travel
name: "Trip Recap Slides Audit"
---
- waitForAnimationToEnd:
    timeout: 10000

# Navigate to My Trips
- tapOn:
    text: "My Trips"
- waitForAnimationToEnd:
    timeout: 5000

# Find and tap a past trip to open recap
- tapOn:
    text: "Boracay"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: screenshots/04_recap_hero

# Tap right side to advance slide
- tapOn:
    point: "80%,50%"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: screenshots/04_recap_stats

# Next slide
- tapOn:
    point: "80%,50%"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: screenshots/04_recap_moments

# Next slide
- tapOn:
    point: "80%,50%"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: screenshots/04_recap_slide4

# Next slide
- tapOn:
    point: "80%,50%"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: screenshots/04_recap_slide5

# Next slide
- tapOn:
    point: "80%,50%"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: screenshots/04_recap_slide6

# Next slide
- tapOn:
    point: "80%,50%"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: screenshots/04_recap_slide7

# Close recap
- tapOn:
    point: "90%,8%"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Go back to Home
- tapOn:
    text: "Home"
- waitForAnimationToEnd:
    timeout: 3000
