appId: com.afterstay.travel
name: "Budget Tab Audit"
---
- waitForAnimationToEnd:
    timeout: 10000

# Navigate to Budget
- tapOn:
    text: "Budget"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: screenshots/06_budget_top

# Scroll to see content
- scroll:
    direction: DOWN
- waitForAnimationToEnd
- takeScreenshot: screenshots/06_budget_scrolled

# Scroll more
- scroll:
    direction: DOWN
- waitForAnimationToEnd
- takeScreenshot: screenshots/06_budget_bottom

# Back to Home
- tapOn:
    text: "Home"
- waitForAnimationToEnd:
    timeout: 3000
